---
# Homelab Apps - Development Inventory
#
# Used by Semaphore to deploy application services.
# Semaphore runs on hephaestus-dev with host networking (VLAN 20),
# so no ProxyJump is needed to reach other VLAN 20 hosts.

all:
  vars:
    ansible_user: semaphore-svc
    ansible_become: true
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    env: dev
    base_domain: thebozic.com

  children:
    app_hosts:
      vars:
        # Infrastructure flags for container audit
        # These must match what's deployed by the homelab repo
        docker_socket_proxy_enabled: true
      hosts:
        orion-dev:
          ansible_host: 192.168.20.100
          homepage_config_type: applications
          # Infrastructure services on this host
          traefik_enabled: true
          komodo_mode: "periphery"

        hephaestus-dev:
          ansible_host: 192.168.20.200
          homepage_config_type: infrastructure
          # Infrastructure services on this host
          traefik_enabled: true
          komodo_mode: "core"
          harbor_enabled: true
          semaphore_enabled: true
          docs_server_enabled: true

    # Infrastructure hosts — not managed by manifest.yml
    # Used for security audits and other cross-host reports
    infra_hosts:
      hosts:
        argus-dev:
          ansible_host: 192.168.20.50

        pharos-dev:
          ansible_host: 192.168.20.150

        atlas-dev:
          ansible_host: 192.168.20.250

        hermes-dev:
          ansible_host: 192.168.68.10
