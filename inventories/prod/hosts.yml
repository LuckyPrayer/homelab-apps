---
# Homelab Apps - Production Inventory
#
# Used by Semaphore to deploy application services.
# Semaphore runs on hephaestus-prod with host networking (VLAN 10),
# so no ProxyJump is needed to reach other VLAN 10 hosts.

all:
  vars:
    ansible_user: semaphore-svc
    ansible_become: true
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    env: prod
    base_domain: thebozic.com

  children:
    app_hosts:
      vars:
        # Infrastructure flags for container audit
        # These must match what's deployed by the homelab repo
        docker_socket_proxy_enabled: true
      hosts:
        orion-prod:
          ansible_host: 192.168.10.100
          homepage_config_type: applications
          # Infrastructure services on this host
          traefik_enabled: true
          komodo_mode: "periphery"

        hephaestus-prod:
          ansible_host: 192.168.10.200
          homepage_config_type: infrastructure
          # Infrastructure services on this host
          traefik_enabled: true
          komodo_mode: "core"
          harbor_enabled: true
          semaphore_enabled: true
          docs_server_enabled: true
