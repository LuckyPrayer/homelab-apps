# Homelab Apps Manifest
# Defines which applications deploy to which hosts
#
# Usage:
#   - Ansible reads this to determine deployments
#   - Profiles group related apps together
#   - Per-host overrides allow customization

# =============================================================================
# PROFILES - Reusable app groupings
# =============================================================================
profiles:
  core:
    description: Essential infrastructure services
    apps:
      - homepage
  
  productivity:
    description: Productivity and personal tools
    apps:
      - vaultwarden
      - n8n
  
  recipes:
    description: Meal planning and recipes
    apps:
      - mealie
  
  gaming:
    description: Game servers
    apps:
      - stardew-server
  
  social-dev:
    description: Discord bots and social integrations (Dev)
    apps:
      - timbot-ll
  
  social-prod:
    description: Discord bots and social integrations (Prod)
    apps:
      - timbot-tb

# NOTE: monitoring (Grafana, Prometheus, node-exporter) and media (Jellyfin,
# Audiobookshelf) are deployed as infrastructure via the homelab repo's Ansible
# roles, not through homelab-apps. Add profiles here only when migrating them
# to app-managed deployments with their own config.yml + docker-compose.yml.

# NOTE: uptime-kuma is deployed as infrastructure via Ansible (uptime-kuma role)
# and is NOT managed through homelab-apps. See playbooks/deploy-pharos.yml.

# =============================================================================
# HOSTS - Per-host application assignments
# =============================================================================
hosts:
  # ---------------------------------------------------------------------------
  # Development Environment
  # ---------------------------------------------------------------------------
  orion-dev:
    profiles:
      - core
      - productivity
      - recipes
      - gaming
      - social-dev      # Discord/Twitch bot integrations
    apps:
      - minecraft-ll   # Dev-only Minecraft server
    exclude: []        # Apps to exclude from profiles
    restore:
      enabled: true
      priority_order:  # Restore order (first = highest priority)
        - vaultwarden  # Critical - restore passwords first
        - n8n          # Workflows depend on other services
        - mealie
        - minecraft-ll
        - stardew-server
  
  hephaestus-dev:
    profiles:
      - core
    apps: []
    exclude: []
    restore:
      enabled: false
  
  # ---------------------------------------------------------------------------
  # Production Environment
  # ---------------------------------------------------------------------------
  orion-prod:
    profiles:
      - core
      - productivity
      - recipes
      - social-prod    # Discord/Twitch bot integrations
    apps:
      - minecraft-mh   # Prod-only Minecraft server (Mental Hospital SMP)
    exclude: []
    restore:
      enabled: true
      priority_order:
        - vaultwarden
        - n8n
        - mealie
        - minecraft-mh
  
  hephaestus-prod:
    profiles:
      - core
    apps: []
    exclude: []
    restore:
      enabled: false

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
settings:
  # Default environment variables for all apps
  # NOTE: env and base_domain come from the Ansible inventory, not here
  defaults:
    TZ: America/Toronto
  
  # Git repository settings
  repo:
    url: git@github.com:LuckyPrayer/homelab-apps.git
    branch: main
    deploy_path: /opt/apps
  
  # Backup integration
  backup:
    backend: restic
    repository: b2:homelab-backup
    schedule: "0 3 * * *"  # 3 AM daily
