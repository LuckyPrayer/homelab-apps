# Mealie - Recipe Manager
# A self-hosted recipe manager and meal planner
# 
# Deployed via Komodo Git integration
# Secrets: OPENAI_API_KEY, SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD, SMTP_FROM (required)
# Infisical path: /services/mealie/
# Docs: https://docs.mealie.io/

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.14.0
    container_name: mealie
    user: "3002:3002"  # Run as docker-svc user
    environment:
      - ALLOW_SIGNUP=false
      - PUID=3002
      - PGID=3002
      - TZ=${TZ:-America/Toronto}
      - BASE_URL=https://mealie.${ENV:-dev}.${BASE_DOMAIN:-thebozic.com}
      - DB_ENGINE=sqlite
      # OpenAI integration (from Infisical: /services/mealie/)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_ENABLE_IMAGE_SERVICES=True
      - OPENAI_SEND_DATABASE_DATA=True
      # SMTP email configuration (from Infisical: /services/mealie/)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM}
      - SMTP_FROM_NAME=Mealie
      - SMTP_AUTH_STRATEGY=TLS
    volumes:
      - ./data:/app/data
    ports:
      - "9000:9000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mealie.rule=Host(`mealie.${ENV:-dev}.${BASE_DOMAIN:-thebozic.com}`)"
      - "traefik.http.routers.mealie.entrypoints=websecure"
      - "traefik.http.routers.mealie.tls.certresolver=mytls"
      - "traefik.http.services.mealie.loadbalancer.server.port=9000"
    restart: unless-stopped
    networks:
      - homelab

networks:
  homelab:
    name: homelab
    external: true
