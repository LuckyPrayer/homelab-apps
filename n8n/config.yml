# n8n - Workflow Automation
# A powerful workflow automation tool
#
# Secrets: MEALIE_API_TOKEN, HOMEASSISTANT_API_TOKEN (for shopping list sync)
#          DISCORD_WEBHOOK_URL (optional, for error notifications)
# Data stored in ./data directory

name: n8n
description: Workflow automation platform
image: docker.n8n.io/n8nio/n8n:1.122.2

# Data directory ownership (UID:GID for container user)
# n8n runs as user 1000 inside container, but we run as docker-svc (3002)
data_owner:
  uid: 3002
  gid: 3002

# Secrets for shopping list sync workflows
# Store in Infisical under /services/n8n
secrets:
  infisical_path: /services/n8n
  required:
    - MEALIE_API_TOKEN       # Mealie long-lived API token (User Profile → API Tokens)
    - HOMEASSISTANT_API_TOKEN # HA long-lived access token (Profile → Long-Lived Access Tokens)
  optional:
    - DISCORD_WEBHOOK_URL    # Discord webhook for error notifications
    - HA_URL                 # Override HA URL (default: uses inventory host_var)

# Backup configuration
backup:
  enabled: true
  paths:
    - data
