---
# Deploy Security Audit & Cert Expiry Scripts to Infrastructure Hosts
#
# This playbook deploys security-audit.sh and cert-expiry.sh to hosts that
# are NOT managed by the homelab-apps manifest (argus, pharos, atlas, hermes).
# App hosts (orion, hephaestus) get these scripts via the standard deploy flow.
#
# Usage in Semaphore:
#   - Template: "Deploy Security Audit - Infra Hosts"
#   - Playbook: playbooks/deploy-security-audit.yml
#   - Arguments: ["--limit", "argus-dev"] (optional)

- name: Deploy Security Audit & Cert Expiry Scripts
  hosts: infra_hosts
  become: true
  tags:
    - deploy
    - security

  pre_tasks:
    - name: Display deploy info
      ansible.builtin.debug:
        msg:
          - "╔════════════════════════════════════════════════════════════════╗"
          - "║      Deploy Security & Cert Expiry Scripts                   ║"
          - "╚════════════════════════════════════════════════════════════════╝"
          - ""
          - "Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Environment: {{ env }}"

    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset:
          - min

  tasks:
    - name: Ensure scripts directory exists
      ansible.builtin.file:
        path: /opt/scripts
        state: directory
        mode: '0755'

    - name: Deploy security-audit.sh
      ansible.builtin.template:
        src: "../roles/homelab-apps/templates/security-audit.sh.j2"
        dest: /opt/scripts/security-audit.sh
        mode: '0755'

    - name: Deploy cert-expiry.sh
      ansible.builtin.template:
        src: "../roles/homelab-apps/templates/cert-expiry.sh.j2"
        dest: /opt/scripts/cert-expiry.sh
        mode: '0755'

    - name: Verify security-audit.sh runs
      ansible.builtin.shell: /opt/scripts/security-audit.sh --json | python3 -m json.tool > /dev/null
      register: verify_security
      failed_when: false
      changed_when: false

    - name: Verify cert-expiry.sh runs
      ansible.builtin.shell: /opt/scripts/cert-expiry.sh --json | python3 -m json.tool > /dev/null
      register: verify_certs
      failed_when: false
      changed_when: false

    - name: Display verification results
      ansible.builtin.debug:
        msg:
          - "{{ '✓' if verify_security.rc == 0 else '⚠' }} security-audit.sh {{ 'verified OK' if verify_security.rc == 0 else 'produced warnings (rc=' + verify_security.rc|string + ')' }}"
          - "{{ '✓' if verify_certs.rc == 0 else '⚠' }} cert-expiry.sh {{ 'verified OK' if verify_certs.rc == 0 else 'produced warnings (rc=' + verify_certs.rc|string + ')' }}"

  post_tasks:
    - name: Deploy complete
      ansible.builtin.debug:
        msg:
          - "✓ Scripts deployed to {{ inventory_hostname }}"
          - "  Path: /opt/scripts/"
          - "  Scripts:"
          - "    - security-audit.sh [--json] [--days N]"
          - "    - cert-expiry.sh [--json] [--warn N] [--crit N]"
