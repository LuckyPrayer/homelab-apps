---
# User & Sudo Audit Report via Semaphore
#
# This playbook runs user-audit.sh on all hosts to check:
#   - Unexpected UIDs >= 1000
#   - Blanket NOPASSWD: ALL sudoers entries
#   - Unexpected SSH authorized_keys
#
# Usage in Semaphore:
#   - Template: "User Audit - All Hosts"
#   - Playbook: playbooks/report-users.yml
#   - Arguments: ["--limit", "orion-dev"]  (optional)
#
# Prerequisites:
#   - user-audit.sh deployed on target hosts
#   - App hosts: deployed via deploy-all.yml
#   - Infra hosts: deployed via deploy-security-audit.yml

# =============================================================================
# Play 1: App hosts — use the homelab-apps role (manifest-aware)
# =============================================================================
- name: "User & Sudo Audit Report — App Hosts"
  hosts: app_hosts
  become: true
  tags:
    - report
    - users

  pre_tasks:
    - name: Display report info
      ansible.builtin.debug:
        msg:
          - "╔════════════════════════════════════════════════════════════════╗"
          - "║      Semaphore: User & Sudo Audit Report                     ║"
          - "╚════════════════════════════════════════════════════════════════╝"
          - ""
          - "Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Environment: {{ env }}"

    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - min

  roles:
    - role: homelab-apps
      vars:
        homelab_apps_mode: report
        report_type: users

  post_tasks:
    - name: Report complete
      ansible.builtin.debug:
        msg:
          - "✓ User audit report complete on {{ inventory_hostname }}"
          - "  Environment: {{ env }}"

# =============================================================================
# Play 2: Infrastructure hosts — inline tasks (not in manifest.yml)
# =============================================================================
- name: "User & Sudo Audit Report — Infrastructure Hosts"
  hosts: infra_hosts
  become: true
  tags:
    - report
    - users

  pre_tasks:
    - name: Display report info
      ansible.builtin.debug:
        msg:
          - "╔════════════════════════════════════════════════════════════════╗"
          - "║      Semaphore: User & Sudo Audit Report (Infra)             ║"
          - "╚════════════════════════════════════════════════════════════════╝"
          - ""
          - "Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Environment: {{ env }}"

    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - min

  tasks:
    # --- Fetch Discord webhook ---
    - name: Fetch Discord webhook URL from Infisical
      ansible.builtin.uri:
        url: "https://app.infisical.com/api/v3/secrets/raw?workspaceId={{ lookup('env', 'INFISICAL_PROJECT_ID') }}&environment={{ env }}&secretPath=/services/semaphore"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('env', 'INFISICAL_TOKEN') }}"
        return_content: true
      register: _discord_webhook_result
      no_log: true
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      failed_when: false
      run_once: true

    - name: Set Discord webhook fact
      ansible.builtin.set_fact:
        _report_discord_webhook: >-
          {{ (_discord_webhook_result.json.secrets
              | default([])
              | selectattr('secretKey', 'equalto', 'DISCORD_WEBHOOK_URL')
              | map(attribute='secretValue')
              | first)
             | default('') }}
      no_log: true
      run_once: true
      when: _discord_webhook_result is defined

    - name: Warn if Discord webhook not available
      ansible.builtin.debug:
        msg: "⚠ DISCORD_WEBHOOK_URL not found in Infisical. Reports will display but not send to Discord."
      run_once: true
      when: (_report_discord_webhook | default('')) | length == 0

    # --- Run user audit report ---
    - name: Check user-audit.sh exists
      ansible.builtin.stat:
        path: /opt/scripts/user-audit.sh
      register: user_script_stat

    - name: Run user audit report
      ansible.builtin.shell: /opt/scripts/user-audit.sh
      register: user_report
      failed_when: false
      changed_when: false
      when: user_script_stat.stat.exists | default(false)

    - name: Display user audit report
      ansible.builtin.debug:
        msg: "{{ user_report.stdout }}"
      when:
        - user_report.stdout is defined
        - user_report.stdout | length > 0

    - name: Warn if user-audit.sh not found
      ansible.builtin.debug:
        msg: "⚠ user-audit.sh not found on {{ inventory_hostname }}. Run deploy-security-audit.yml first."
      when: not (user_script_stat.stat.exists | default(false))

    # --- Discord embed ---
    - name: Collect user audit JSON for Discord
      ansible.builtin.shell: /opt/scripts/user-audit.sh --json
      register: user_json
      failed_when: false
      changed_when: false
      when:
        - user_script_stat.stat.exists | default(false)
        - (_report_discord_webhook | default('')) | length > 0

    - name: Build user audit Discord embed
      ansible.builtin.set_fact:
        _user_embed: |
          {% set data = user_json.stdout | from_json %}
          {% set u = data.users %}
          {% set s = data.sudoers %}
          {% set k = data.ssh_keys %}
          {% set has_issues = (data.issues > 0) %}
          {% set has_warnings = (data.warnings > 0) %}
          {
            "embeds": [{
              "title": "👤 User & Sudo Audit",
              "description": "**User Accounts** (UID ≥ 1000)\n{{ u.total }} account(s){% if u.unexpected > 0 %} · ⚠️ {{ u.unexpected }} unexpected{% else %} · ✅ all expected{% endif %}\n{% for a in u.accounts %}{% if a.status == 'unexpected' %}\n⚠️{% else %}\n✅{% endif %} `{{ a.name }}` uid={{ a.uid }}{% endfor %}\n\n**Sudoers**\n{{ s.blanket_nopasswd }} blanket NOPASSWD · {{ s.scoped_nopasswd }} scoped{% if s.unexpected_blanket > 0 %} · ❌ {{ s.unexpected_blanket }} unexpected blanket{% endif %}\n\n**SSH Keys**\n{{ k.total }} key(s){% if k.unexpected > 0 %} · ❌ {{ k.unexpected }} unexpected{% endif %}{% if k.duplicates > 0 %} · ⚠️ {{ k.duplicates }} duplicate{% endif %}{% if k.unexpected == 0 and k.duplicates == 0 %} · ✅ all expected{% endif %}",
              "color": {% if has_issues %}15158332{% elif has_warnings %}15105570{% else %}3066993{% endif %},
              "fields": [
                {"name": "Host", "value": "{{ data.host }}", "inline": true},
                {"name": "Environment", "value": "{{ data.env }}", "inline": true},
                {"name": "Summary", "value": "{{ data.issues }} issue(s) · {{ data.warnings }} warning(s)", "inline": true}
              ],
              "timestamp": "{{ data.timestamp }}"
            }]
          }
      when:
        - user_json is defined
        - user_json.rc is defined
        - user_json.stdout is defined
        - user_json.stdout | length > 0
        - (_report_discord_webhook | default('')) | length > 0

    - name: Send user audit report to Discord
      ansible.builtin.uri:
        url: "{{ _report_discord_webhook }}"
        method: POST
        body_format: json
        body: "{{ _user_embed | from_yaml }}"
        status_code: [200, 204]
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      failed_when: false
      when:
        - _user_embed is defined
        - (_report_discord_webhook | default('')) | length > 0

  post_tasks:
    - name: Report complete
      ansible.builtin.debug:
        msg:
          - "✓ User audit report complete on {{ inventory_hostname }}"
          - "  Environment: {{ env }}"
