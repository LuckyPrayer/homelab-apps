---
# Restore Homelab Apps via Semaphore
#
# This playbook restores application data from B2/restic backups
# using the restore.sh script. The role resolves which apps are
# assigned per host from manifest.yml, then runs restore.sh for each.
#
# restore.sh handles:
#   - Downloading snapshots from B2
#   - Extracting tar archives to the correct paths
#   - Stopping/starting containers
#   - Database restoration (if applicable)
#   - Pre/post restore hooks from config.yml
#
# Usage in Semaphore:
#   - Template: "Restore Apps - All Hosts"
#   - Playbook: playbooks/restore-apps.yml
#   - Arguments: ["--limit", "orion-dev"]
#   - Arguments: ["-e", "app_filter=vaultwarden"]
#
# Prerequisites:
#   - Apps deployed (repo cloned, restore.sh + backup.env on host)
#   - Restic snapshots available in B2 bucket

- name: Restore Homelab Apps
  hosts: semaphore_app_hosts
  become: true
  vars_files:
    - vars/semaphore-connection.yml
  tags:
    - restore

  pre_tasks:
    - name: Display restore info
      ansible.builtin.debug:
        msg:
          - "╔════════════════════════════════════════════════════════════════╗"
          - "║      Semaphore: Homelab App Restore                          ║"
          - "╚════════════════════════════════════════════════════════════════╝"
          - ""
          - "Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Environment: {{ env }}"
          - "App filter: {{ app_filter | default('all') }}"

    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - min

  roles:
    - role: homelab-apps
      vars:
        homelab_apps_mode: restore

  post_tasks:
    - name: Restore complete
      ansible.builtin.debug:
        msg:
          - "✓ Restore operation complete on {{ inventory_hostname }}"
          - "  Environment: {{ env }}"
