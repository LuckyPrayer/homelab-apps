---
# Restore Homelab Apps via Semaphore
#
# This playbook restores application data from B2/restic backups.
# The role resolves which apps are assigned per host from manifest.yml,
# sources backup credentials from /opt/scripts/backup.env, and runs
# restore-app.yml for each app.
#
# By default, restore skips apps that already have data. Use
# force_restore=true to overwrite existing data.
#
# Usage in Semaphore:
#   - Template: "Restore Apps - All Hosts"
#   - Playbook: playbooks/restore-apps.yml
#   - Arguments: ["--limit", "orion-dev"]
#   - Arguments: ["-e", "app_filter=vaultwarden"]
#   - Arguments: ["-e", "force_restore=true"]
#
# Prerequisites:
#   - Apps deployed (repo cloned, config files in place)
#   - B2 credentials configured via /opt/scripts/backup.env
#   - Restic snapshots available in B2 bucket

- name: Restore Homelab Apps
  hosts: app_hosts
  become: true
  tags:
    - restore

  pre_tasks:
    - name: Display restore info
      ansible.builtin.debug:
        msg:
          - "╔════════════════════════════════════════════════════════════════╗"
          - "║      Semaphore: Homelab App Restore                          ║"
          - "╚════════════════════════════════════════════════════════════════╝"
          - ""
          - "Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Environment: {{ env }}"
          - "App filter: {{ app_filter | default('all') }}"
          - "Force restore: {{ force_restore | default(false) }}"

    - name: Gather facts
      ansible.builtin.setup:
        gather_subset:
          - min

  roles:
    - role: homelab-apps
      vars:
        homelab_apps_mode: restore

  post_tasks:
    - name: Restore complete
      ansible.builtin.debug:
        msg:
          - "✓ Restore operation complete on {{ inventory_hostname }}"
          - "  Environment: {{ env }}"
