---
# Homelab Apps Role - Manifest-Based Application Deployment
# 
# This role reads from the homelab-apps manifest.yml to determine which
# applications to deploy on each host, then handles deployment and optional restore.
#
# Variables:
#   - homelab_apps_repo: Git repo URL (default from manifest settings)
#   - homelab_apps_branch: Git branch (default: main)
#   - homelab_apps_path: Local path on host (default: /opt/apps)
#   - homelab_apps_restore: Whether to restore from backup (default: from manifest)
#   - app_filter: When set, deploy only this single app (e.g. "vaultwarden")

- name: Set default variables
  ansible.builtin.set_fact:
    homelab_apps_path: "{{ homelab_apps_path | default('/opt/apps') }}"
    homelab_stacks_path: "{{ homelab_stacks_path | default('/opt/stacks') }}"
    homelab_apps_branch: "{{ homelab_apps_branch | default('main') }}"

# =============================================================================
# Clone/Update the homelab-apps repository
# =============================================================================

- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true

- name: Mark homelab-apps directory as safe for git
  ansible.builtin.command:
    cmd: git config --global --add safe.directory {{ homelab_apps_path }}
  changed_when: false

- name: Clone homelab-apps repository
  ansible.builtin.git:
    repo: "{{ homelab_apps_repo | default('https://github.com/LuckyPrayer/homelab-apps.git') }}"
    dest: "{{ homelab_apps_path }}"
    version: "{{ homelab_apps_branch }}"
    force: true
  register: git_clone_result

- name: Read manifest.yml
  ansible.builtin.slurp:
    src: "{{ homelab_apps_path }}/manifest.yml"
  register: manifest_raw

- name: Parse manifest
  ansible.builtin.set_fact:
    manifest: "{{ manifest_raw.content | b64decode | from_yaml }}"

# =============================================================================
# Resolve apps for this host
# =============================================================================

- name: Get host configuration from manifest
  ansible.builtin.set_fact:
    host_config: "{{ manifest.hosts[inventory_hostname] | default({}) }}"

- name: Fail if host not in manifest
  ansible.builtin.fail:
    msg: "Host {{ inventory_hostname }} not found in manifest.yml"
  when: host_config | length == 0

- name: Resolve profile apps
  ansible.builtin.set_fact:
    profile_apps: >-
      {{
        host_config.profiles | default([])
        | map('extract', manifest.profiles)
        | map(attribute='apps', default=[])
        | flatten
        | unique
        | list
      }}

- name: Combine profile apps with additional apps
  ansible.builtin.set_fact:
    all_apps: "{{ (profile_apps + (host_config.apps | default([]))) | unique | list }}"

- name: Remove excluded apps
  ansible.builtin.set_fact:
    final_apps: "{{ all_apps | difference(host_config.exclude | default([])) | list }}"

- name: Filter to specific app (app_filter)
  ansible.builtin.set_fact:
    final_apps: "{{ final_apps | select('equalto', app_filter) | list }}"
  when: app_filter is defined and app_filter | length > 0

- name: Display apps to deploy
  ansible.builtin.debug:
    msg: "Apps to deploy on {{ inventory_hostname }}: {{ final_apps | join(', ') }}"

# =============================================================================
# Deploy each application
# =============================================================================

- name: Check which apps exist in repository
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/{{ item }}/docker-compose.yml"
  loop: "{{ final_apps }}"
  register: app_exists_check

- name: Build list of deployable apps
  ansible.builtin.set_fact:
    deployable_apps: >-
      {{
        app_exists_check.results
        | selectattr('stat.exists', 'equalto', true)
        | map(attribute='item')
        | list
      }}

- name: Warn about missing apps
  ansible.builtin.debug:
    msg: "WARNING: App '{{ item }}' not found in repository, skipping"
  loop: "{{ final_apps | difference(deployable_apps) }}"
  when: final_apps | difference(deployable_apps) | length > 0

# =============================================================================
# Enforce allowed_hosts from each app's config.yml
# =============================================================================

- name: Read config.yml for each deployable app
  ansible.builtin.slurp:
    src: "{{ homelab_apps_path }}/{{ item }}/config.yml"
  loop: "{{ deployable_apps }}"
  register: app_configs_raw
  failed_when: false

- name: Parse app configs and check allowed_hosts
  ansible.builtin.set_fact:
    _app_configs: >-
      {%- set result = {} -%}
      {%- for item in app_configs_raw.results -%}
        {%- if item.content is defined -%}
          {%- set cfg = item.content | b64decode | from_yaml -%}
          {%- set _ = result.update({item.item: cfg}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Warn about manifest/allowed_hosts mismatches
  ansible.builtin.debug:
    msg: >-
      ⚠ MISMATCH: App '{{ item }}' is assigned to {{ inventory_hostname }} in manifest.yml
      but allowed_hosts in config.yml is {{ _app_configs[item].allowed_hosts }}.
      Skipping deployment. Update allowed_hosts or manifest.yml to resolve.
  loop: "{{ deployable_apps }}"
  when:
    - _app_configs[item] is defined
    - _app_configs[item].allowed_hosts is defined
    - _app_configs[item].allowed_hosts | length > 0
    - inventory_hostname not in _app_configs[item].allowed_hosts

- name: Filter apps by allowed_hosts
  ansible.builtin.set_fact:
    deployable_apps: >-
      {%- set allowed = [] -%}
      {%- for app in deployable_apps -%}
        {%- if _app_configs[app] is defined
            and _app_configs[app].allowed_hosts is defined
            and _app_configs[app].allowed_hosts | length > 0
            and inventory_hostname not in _app_configs[app].allowed_hosts -%}
          {# skip - host not in allowed_hosts #}
        {%- else -%}
          {%- set _ = allowed.append(app) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ allowed }}

- name: Display final deployable apps (after allowed_hosts filtering)
  ansible.builtin.debug:
    msg: "Apps to deploy on {{ inventory_hostname }} (allowed_hosts verified): {{ deployable_apps | join(', ') }}"

# =============================================================================
# DEPLOY MODE: Deploy applications
# =============================================================================

- name: Create stacks directory
  ansible.builtin.file:
    path: "{{ homelab_stacks_path | default('/opt/stacks') }}"
    state: directory
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Deploy applications
  ansible.builtin.include_tasks: deploy-app.yml
  loop: "{{ deployable_apps }}"
  loop_control:
    loop_var: app_name
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Handle restore if enabled in manifest
# =============================================================================

- name: Check if restore is enabled for this host
  ansible.builtin.set_fact:
    restore_enabled: "{{ host_config.restore.enabled | default(false) }}"
    restore_order: "{{ host_config.restore.priority_order | default([]) }}"
  when: homelab_apps_mode == 'deploy'

- name: Run restore for apps (deploy mode)
  ansible.builtin.include_tasks: restore-app.yml
  loop: "{{ restore_order }}"
  loop_control:
    loop_var: app_name
  when:
    - homelab_apps_mode == 'deploy'
    - restore_enabled | bool
    - app_name in deployable_apps
    - homelab_apps_restore | default(true) | bool

# =============================================================================
# BACKUP MODE: Run backup.sh for resolved apps
# =============================================================================

- name: Check backup.sh exists
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/scripts/backup.sh"
  register: backup_script_stat
  when: homelab_apps_mode == 'backup'

- name: Fail if backup.sh not found
  ansible.builtin.fail:
    msg: "backup.sh not found at {{ homelab_apps_path }}/scripts/backup.sh. Deploy apps first."
  when:
    - homelab_apps_mode == 'backup'
    - not (backup_script_stat.stat.exists | default(false))

- name: Display apps to backup
  ansible.builtin.debug:
    msg: "Apps to backup on {{ inventory_hostname }}: {{ deployable_apps | join(', ') }}"
  when: homelab_apps_mode == 'backup'

- name: Run backup for each app
  ansible.builtin.shell: |
    {{ homelab_apps_path }}/scripts/backup.sh {{ item }}
  loop: "{{ deployable_apps }}"
  register: backup_results
  failed_when: false
  when: homelab_apps_mode == 'backup'

- name: Display backup results
  ansible.builtin.debug:
    msg: "{{ '✓' if item.rc == 0 else '✗' }} {{ item.item }} (rc={{ item.rc }})"
  loop: "{{ backup_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when:
    - homelab_apps_mode == 'backup'
    - backup_results.results is defined

# =============================================================================
# RESTORE MODE: Restore apps from B2/restic backup using restore.sh
# =============================================================================

- name: Check restore.sh exists
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/scripts/restore.sh"
  register: restore_script_stat
  when: homelab_apps_mode == 'restore'

- name: Fail if restore.sh not found
  ansible.builtin.fail:
    msg: "restore.sh not found at {{ homelab_apps_path }}/scripts/restore.sh. Deploy apps first."
  when:
    - homelab_apps_mode == 'restore'
    - not (restore_script_stat.stat.exists | default(false))

- name: Display apps to restore
  ansible.builtin.debug:
    msg: "Apps to restore on {{ inventory_hostname }}: {{ deployable_apps | join(', ') }}"
  when: homelab_apps_mode == 'restore'

- name: Run restore for each app
  ansible.builtin.shell: |
    {{ homelab_apps_path }}/scripts/restore.sh {{ item }}
  loop: "{{ deployable_apps }}"
  register: restore_results
  failed_when: false
  when: homelab_apps_mode == 'restore'

- name: Display restore results
  ansible.builtin.debug:
    msg: "{{ '✓' if item.rc == 0 else '✗' }} {{ item.item }} (rc={{ item.rc }})"
  loop: "{{ restore_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when:
    - homelab_apps_mode == 'restore'
    - restore_results.results is defined

# =============================================================================
# REPORT MODE: Generate reports on container and backup status
# =============================================================================

# --- Fetch Discord Webhook URL from Infisical ---
- name: Fetch Discord webhook URL from Infisical
  ansible.builtin.uri:
    url: "https://app.infisical.com/api/v3/secrets/raw?workspaceId={{ lookup('env', 'INFISICAL_PROJECT_ID') }}&environment={{ env }}&secretPath=/services/semaphore"
    method: GET
    headers:
      Authorization: "Bearer {{ lookup('env', 'INFISICAL_TOKEN') }}"
    return_content: true
  register: _discord_webhook_result
  no_log: true
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  failed_when: false
  run_once: true
  when: homelab_apps_mode == 'report'

- name: Set Discord webhook fact
  ansible.builtin.set_fact:
    _report_discord_webhook: >-
      {{ (_discord_webhook_result.json.secrets
          | default([])
          | selectattr('secretKey', 'equalto', 'DISCORD_WEBHOOK_URL')
          | map(attribute='secretValue')
          | first)
         | default('') }}
  no_log: true
  run_once: true
  when:
    - homelab_apps_mode == 'report'
    - _discord_webhook_result is defined

- name: Warn if Discord webhook not available
  ansible.builtin.debug:
    msg: "⚠ DISCORD_WEBHOOK_URL not found in Infisical at /services/semaphore. Reports will display but not send to Discord."
  run_once: true
  when:
    - homelab_apps_mode == 'report'
    - (_report_discord_webhook | default('')) | length == 0

# --- Container Status Report ---
- name: Check app-status.sh exists
  ansible.builtin.stat:
    path: /opt/scripts/app-status.sh
  register: status_script_stat
  when: homelab_apps_mode == 'report'

- name: Run container status report
  ansible.builtin.shell: /opt/scripts/app-status.sh
  register: status_report
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - status_script_stat.stat.exists | default(false)

- name: Display container status report
  ansible.builtin.debug:
    msg: "{{ status_report.stdout }}"
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - status_report.stdout is defined
    - status_report.stdout | length > 0

- name: Warn if app-status.sh not found
  ansible.builtin.debug:
    msg: "⚠ app-status.sh not found on {{ inventory_hostname }}. Run deploy first."
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - not (status_script_stat.stat.exists | default(false))

- name: Collect container status JSON for Discord
  ansible.builtin.shell: /opt/scripts/app-status.sh --json
  register: status_json
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - status_script_stat.stat.exists | default(false)
    - (_report_discord_webhook | default('')) | length > 0

- name: Build container status Discord embed
  ansible.builtin.set_fact:
    _status_embed: |
      {% set data = status_json.stdout | from_json %}
      {% set total = data.apps | length %}
      {% set running = data.apps | selectattr('status', 'equalto', 'running') | list | length %}
      {% set healthy = data.apps | selectattr('health', 'equalto', 'healthy') | list | length %}
      {% set all_ok = (running == total) %}
      {
        "embeds": [{
          "title": "📊 Container Status Report",
          "description": "{% for app in data.apps %}{{ '✅' if app.status == 'running' else '❌' }} **{{ app.name }}** — {{ app.status }}{% if app.health != 'N/A' %} ({{ app.health }}){% endif %}{% if app.started is defined and app.started != 'N/A' %} · up {{ app.started }}{% endif %}\n{% endfor %}",
          "color": {{ 3066993 if all_ok else 15158332 }},
          "fields": [
            {"name": "Host", "value": "{{ data.host }}", "inline": true},
            {"name": "Environment", "value": "{{ data.env }}", "inline": true},
            {"name": "Summary", "value": "{{ running }}/{{ total }} running · {{ healthy }} healthy", "inline": true}
          ],
          "timestamp": "{{ data.timestamp }}"
        }]
      }
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - status_json is defined
    - status_json.rc | default(1) == 0
    - (_report_discord_webhook | default('')) | length > 0

- name: Send container status report to Discord
  ansible.builtin.uri:
    url: "{{ _report_discord_webhook }}"
    method: POST
    body_format: json
    body: "{{ _status_embed | from_yaml }}"
    status_code: [200, 204]
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  failed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['status', 'all']
    - _status_embed is defined
    - (_report_discord_webhook | default('')) | length > 0

# --- Backup Report ---
- name: Check restore.sh exists (for backup report)
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/scripts/restore.sh"
  register: report_restore_stat
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']

- name: Run backup snapshot report
  ansible.builtin.shell: |
    {{ homelab_apps_path }}/scripts/restore.sh list
  register: backup_report
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - report_restore_stat.stat.exists | default(false)

- name: Display backup snapshot report
  ansible.builtin.debug:
    msg: "{{ backup_report.stdout }}"
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - backup_report.stdout is defined
    - backup_report.stdout | length > 0

- name: Check per-app backup freshness
  ansible.builtin.shell: |
    . /opt/scripts/backup.env 2>/dev/null || true
    export B2_ACCOUNT_ID B2_ACCOUNT_KEY RESTIC_PASSWORD
    export RESTIC_REPOSITORY="b2:${B2_BUCKET}:$(hostname)"
    echo ""
    echo "════════════════════════════════════════════════════════════════"
    echo "  Backup Freshness Report - $(hostname)"
    echo "════════════════════════════════════════════════════════════════"
    echo ""
    printf "%-20s %-12s %-20s %s\n" "APP" "STATUS" "LAST BACKUP" "AGE"
    printf "%-20s %-12s %-20s %s\n" "---" "------" "-----------" "---"
    NOW=$(date +%s)
    for app in {{ deployable_apps | join(' ') }}; do
      SNAP_TIME=$(restic snapshots --host "$(hostname)" --path "/opt/backups/$app" --json 2>/dev/null | \
                  jq -r 'sort_by(.time) | last | .time // empty' 2>/dev/null)
      if [ -n "$SNAP_TIME" ]; then
        SNAP_EPOCH=$(date -d "$SNAP_TIME" +%s 2>/dev/null || echo 0)
        AGE_SECS=$((NOW - SNAP_EPOCH))
        AGE_HOURS=$((AGE_SECS / 3600))
        SNAP_SHORT=$(echo "$SNAP_TIME" | cut -dT -f1)
        if [ $AGE_HOURS -lt 25 ]; then
          STATUS="✓ fresh"
        elif [ $AGE_HOURS -lt 73 ]; then
          STATUS="⚠ aging"
        else
          STATUS="✗ stale"
        fi
        if [ $AGE_HOURS -lt 24 ]; then
          AGE_FMT="${AGE_HOURS}h"
        else
          AGE_FMT="$((AGE_HOURS / 24))d"
        fi
        printf "%-20s %-12s %-20s %s\n" "$app" "$STATUS" "$SNAP_SHORT" "$AGE_FMT"
      else
        printf "%-20s %-12s %-20s %s\n" "$app" "✗ none" "-" "-"
      fi
    done
    echo ""
    echo "════════════════════════════════════════════════════════════════"
  register: freshness_report
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - report_restore_stat.stat.exists | default(false)

- name: Display backup freshness report
  ansible.builtin.debug:
    msg: "{{ freshness_report.stdout }}"
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - freshness_report.stdout is defined
    - freshness_report.stdout | length > 0

- name: Warn if restore.sh not found (for backup report)
  ansible.builtin.debug:
    msg: "⚠ restore.sh not found on {{ inventory_hostname }}. Deploy apps first."
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - not (report_restore_stat.stat.exists | default(false))

- name: Collect backup freshness JSON for Discord
  ansible.builtin.shell: |
    . /opt/scripts/backup.env 2>/dev/null || true
    export B2_ACCOUNT_ID B2_ACCOUNT_KEY RESTIC_PASSWORD
    export RESTIC_REPOSITORY="b2:${B2_BUCKET}:$(hostname)"
    NOW=$(date +%s)
    echo "{"
    echo "  \"host\": \"$(hostname)\","
    echo "  \"env\": \"{{ env }}\","
    echo "  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
    echo "  \"apps\": ["
    FIRST=true
    for app in {{ deployable_apps | join(' ') }}; do
      SNAP_TIME=$(restic snapshots --host "$(hostname)" --path "/opt/backups/$app" --json 2>/dev/null | \
                  jq -r 'sort_by(.time) | last | .time // empty' 2>/dev/null)
      $FIRST || echo ","
      FIRST=false
      if [ -n "$SNAP_TIME" ]; then
        SNAP_EPOCH=$(date -d "$SNAP_TIME" +%s 2>/dev/null || echo 0)
        AGE_HOURS=$(( (NOW - SNAP_EPOCH) / 3600 ))
        if [ $AGE_HOURS -lt 25 ]; then STATUS="fresh"
        elif [ $AGE_HOURS -lt 73 ]; then STATUS="aging"
        else STATUS="stale"; fi
        if [ $AGE_HOURS -lt 24 ]; then AGE="${AGE_HOURS}h"
        else AGE="$((AGE_HOURS / 24))d"; fi
        SNAP_SHORT=$(echo "$SNAP_TIME" | cut -dT -f1)
        echo "    {\"name\": \"$app\", \"status\": \"$STATUS\", \"last_backup\": \"$SNAP_SHORT\", \"age\": \"$AGE\"}"
      else
        echo "    {\"name\": \"$app\", \"status\": \"none\", \"last_backup\": null, \"age\": null}"
      fi
    done
    echo "  ]"
    echo "}"
  register: freshness_json
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - report_restore_stat.stat.exists | default(false)
    - (_report_discord_webhook | default('')) | length > 0

- name: Build backup freshness Discord embed
  ansible.builtin.set_fact:
    _backup_embed: |
      {% set data = freshness_json.stdout | from_json %}
      {% set fresh = data.apps | selectattr('status', 'equalto', 'fresh') | list | length %}
      {% set stale = data.apps | selectattr('status', 'equalto', 'stale') | list | length %}
      {% set none_count = data.apps | selectattr('status', 'equalto', 'none') | list | length %}
      {% set total = data.apps | length %}
      {% set all_ok = (fresh == total) %}
      {
        "embeds": [{
          "title": "🗄️ Backup Freshness Report",
          "description": "{% for app in data.apps %}{% if app.status == 'fresh' %}✅{% elif app.status == 'aging' %}⚠️{% elif app.status == 'none' %}🚫{% else %}❌{% endif %} **{{ app.name }}** — {% if app.last_backup %}{{ app.last_backup }} ({{ app.age }}){% else %}no backups found{% endif %}\n{% endfor %}",
          "color": {{ 3066993 if all_ok else (15105570 if stale == 0 else 15158332) }},
          "fields": [
            {"name": "Host", "value": "{{ data.host }}", "inline": true},
            {"name": "Environment", "value": "{{ data.env }}", "inline": true},
            {"name": "Summary", "value": "{{ fresh }} fresh · {{ stale }} stale · {{ none_count }} missing", "inline": true}
          ],
          "timestamp": "{{ data.timestamp }}"
        }]
      }
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - freshness_json is defined
    - freshness_json.rc | default(1) == 0
    - (_report_discord_webhook | default('')) | length > 0

- name: Send backup freshness report to Discord
  ansible.builtin.uri:
    url: "{{ _report_discord_webhook }}"
    method: POST
    body_format: json
    body: "{{ _backup_embed | from_yaml }}"
    status_code: [200, 204]
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  failed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['backups', 'all']
    - _backup_embed is defined
    - (_report_discord_webhook | default('')) | length > 0

# --- Container Audit Report ---
- name: Check audit-containers.sh exists
  ansible.builtin.stat:
    path: /opt/scripts/audit-containers.sh
  register: audit_script_stat
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']

- name: Run container audit report
  ansible.builtin.shell: /opt/scripts/audit-containers.sh
  register: audit_report
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - audit_script_stat.stat.exists | default(false)

- name: Display container audit report
  ansible.builtin.debug:
    msg: "{{ audit_report.stdout }}"
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - audit_report.stdout is defined
    - audit_report.stdout | length > 0

- name: Warn if audit-containers.sh not found
  ansible.builtin.debug:
    msg: "⚠ audit-containers.sh not found on {{ inventory_hostname }}. Run deploy first."
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - not (audit_script_stat.stat.exists | default(false))

- name: Collect container audit JSON for Discord
  ansible.builtin.shell: /opt/scripts/audit-containers.sh --json
  register: audit_json
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - audit_script_stat.stat.exists | default(false)
    - (_report_discord_webhook | default('')) | length > 0

- name: Build container audit Discord embed
  ansible.builtin.set_fact:
    _audit_embed: |
      {% set data = audit_json.stdout | from_json %}
      {% set rogue_count = data.rogue_containers | default([]) | length %}
      {% set missing_count = data.missing_containers | default([]) | length %}
      {% set healthy_count = data.healthy_containers | default([]) | length %}
      {% set has_issues = data.has_issues | default(false) %}
      {
        "embeds": [{
          "title": "🔍 Container Audit Report",
          "description": "{% if not has_issues %}✅ All containers accounted for — no rogue or missing containers detected.{% else %}{% if rogue_count > 0 %}**🚨 Rogue Containers ({{ rogue_count }}):**\n{% for c in data.rogue_containers %}• `{{ c }}`\n{% endfor %}\n{% endif %}{% if missing_count > 0 %}**⚠️ Missing Containers ({{ missing_count }}):**\n{% for c in data.missing_containers %}• `{{ c }}`\n{% endfor %}{% endif %}{% endif %}",
          "color": {{ 15158332 if has_issues else 3066993 }},
          "fields": [
            {"name": "Host", "value": "{{ data.host }}", "inline": true},
            {"name": "Environment", "value": "{{ data.env }}", "inline": true},
            {"name": "Summary", "value": "{{ healthy_count }} healthy · {{ rogue_count }} rogue · {{ missing_count }} missing", "inline": true}
          ],
          "timestamp": "{{ data.timestamp }}"
        }]
      }
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - audit_json is defined
    - audit_json.stdout is defined
    - audit_json.stdout | length > 0
    - (_report_discord_webhook | default('')) | length > 0

- name: Send container audit report to Discord
  ansible.builtin.uri:
    url: "{{ _report_discord_webhook }}"
    method: POST
    body_format: json
    body: "{{ _audit_embed | from_yaml }}"
    status_code: [200, 204]
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  failed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['audit', 'all']
    - _audit_embed is defined
    - (_report_discord_webhook | default('')) | length > 0

# --- Security Audit Report ---
- name: Check security-audit.sh exists
  ansible.builtin.stat:
    path: /opt/scripts/security-audit.sh
  register: security_script_stat
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']

- name: Run security audit report
  ansible.builtin.shell: /opt/scripts/security-audit.sh
  register: security_report
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - security_script_stat.stat.exists | default(false)

- name: Display security audit report
  ansible.builtin.debug:
    msg: "{{ security_report.stdout }}"
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - security_report.stdout is defined
    - security_report.stdout | length > 0

- name: Warn if security-audit.sh not found
  ansible.builtin.debug:
    msg: "⚠ security-audit.sh not found on {{ inventory_hostname }}. Run deploy first."
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - not (security_script_stat.stat.exists | default(false))

- name: Collect security audit JSON for Discord
  ansible.builtin.shell: /opt/scripts/security-audit.sh --json
  register: security_json
  failed_when: false
  changed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - security_script_stat.stat.exists | default(false)
    - (_report_discord_webhook | default('')) | length > 0

- name: Build security audit Discord embed
  ansible.builtin.set_fact:
    _security_embed: |
      {% set data = security_json.stdout | from_json %}
      {% set f2b = data.fail2ban %}
      {% set ssh = data.ssh %}
      {% set upd = data.updates %}
      {% set dock = data.docker %}
      {% set has_issues = (data.issues > 0) %}
      {% set has_warnings = (data.warnings > 0) %}
      {
        "embeds": [{
          "title": "🛡️ Security Audit Report",
          "description": "**Fail2Ban**\n{% if not f2b.installed %}⚠️ Not installed{% elif not f2b.running %}❌ Installed but not running{% else %}✅ Active · {{ f2b.jails }} jail(s) · {{ f2b.currently_banned }} currently banned ({{ f2b.total_banned }} total){% endif %}\n\n**SSH Authentication** ({{ data.lookback_days }}d)\n{% if ssh.failed_logins > 200 %}🚨{% elif ssh.failed_logins > 50 %}⚠️{% else %}✅{% endif %} {{ ssh.failed_logins }} failed · {{ ssh.accepted_logins }} accepted{% if ssh.top_offenders | length > 0 %}\nTop offenders: {% for o in ssh.top_offenders[:5] %}`{{ o.ip }}` ({{ o.count }}){% if not loop.last %}, {% endif %}{% endfor %}{% endif %}\n\n**System Updates**\n{% if upd.auto_upgrade_enabled %}✅{% else %}⚠️{% endif %} Auto-upgrade {{ 'enabled' if upd.auto_upgrade_enabled else 'disabled' }} · {% if upd.pending_security > 0 %}⚠️ {{ upd.pending_security }} pending{% else %}✅ Up to date{% endif %} · {% if upd.needs_restart %}⚠️ Reboot required{% else %}✅ No reboot needed{% endif %}\n\n**Docker Security**\n{{ dock.total_containers }} containers · {% if dock.security_issues > 0 %}⚠️ {{ dock.privileged_containers | length }} privileged{% else %}✅ No privileged containers{% endif %}{% if dock.host_network_containers | length > 0 %} · {{ dock.host_network_containers | length }} host-networked{% endif %}",
          "color": {% if has_issues %}15158332{% elif has_warnings %}15105570{% else %}3066993{% endif %},
          "fields": [
            {"name": "Host", "value": "{{ data.host }}", "inline": true},
            {"name": "Environment", "value": "{{ data.env }}", "inline": true},
            {"name": "Summary", "value": "{{ data.issues }} issue(s) · {{ data.warnings }} warning(s)", "inline": true}
          ],
          "timestamp": "{{ data.timestamp }}"
        }]
      }
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - security_json is defined
    - security_json.rc is defined
    - security_json.stdout is defined
    - security_json.stdout | length > 0
    - (_report_discord_webhook | default('')) | length > 0

- name: Send security audit report to Discord
  ansible.builtin.uri:
    url: "{{ _report_discord_webhook }}"
    method: POST
    body_format: json
    body: "{{ _security_embed | from_yaml }}"
    status_code: [200, 204]
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  failed_when: false
  when:
    - homelab_apps_mode == 'report'
    - report_type | default('status') in ['security', 'all']
    - _security_embed is defined
    - (_report_discord_webhook | default('')) | length > 0

# =============================================================================
# DEPLOY MODE: Create management scripts
# =============================================================================

- name: Create deploy-apps script
  ansible.builtin.template:
    src: deploy-apps.sh.j2
    dest: /opt/scripts/deploy-apps.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create app-status script
  ansible.builtin.template:
    src: app-status.sh.j2
    dest: /opt/scripts/app-status.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Setup container audit (detect rogue/missing containers)
# =============================================================================

- name: Create security-audit script
  ansible.builtin.template:
    src: security-audit.sh.j2
    dest: /opt/scripts/security-audit.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create audit-containers script
  ansible.builtin.template:
    src: audit-containers.sh.j2
    dest: /opt/scripts/audit-containers.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create audit-containers systemd service
  ansible.builtin.template:
    src: audit-containers.service.j2
    dest: /etc/systemd/system/audit-containers.service
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Create audit-containers systemd timer
  ansible.builtin.template:
    src: audit-containers.timer.j2
    dest: /etc/systemd/system/audit-containers.timer
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Enable and start audit-containers timer
  ansible.builtin.systemd:
    name: audit-containers.timer
    state: started
    enabled: true
    daemon_reload: true
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Setup secret refresh service
# =============================================================================

- name: Create refresh-secrets script
  ansible.builtin.template:
    src: refresh-secrets.sh.j2
    dest: /usr/local/bin/refresh-secrets.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create refresh-secrets systemd service
  ansible.builtin.template:
    src: refresh-secrets.service.j2
    dest: /etc/systemd/system/refresh-secrets.service
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Create refresh-secrets systemd timer
  ansible.builtin.template:
    src: refresh-secrets.timer.j2
    dest: /etc/systemd/system/refresh-secrets.timer
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: homelab_apps_mode == 'deploy'

- name: Enable and start refresh-secrets timer
  ansible.builtin.systemd:
    name: refresh-secrets.timer
    state: started
    enabled: true
  when: homelab_apps_mode == 'deploy'

- name: Display deployment summary
  ansible.builtin.debug:
    msg: |
      
      ════════════════════════════════════════════════════════════════
      Homelab Apps Deployment Complete - {{ inventory_hostname }}
      ════════════════════════════════════════════════════════════════
      
      Deployed apps: {{ deployable_apps | join(', ') }}
      Restore enabled: {{ restore_enabled | default(false) }}
      
      Management scripts:
        - /opt/scripts/deploy-apps.sh        # Redeploy all apps
        - /opt/scripts/app-status.sh         # Check app status
        - /opt/scripts/audit-containers.sh   # Detect rogue/missing containers
        - /opt/scripts/security-audit.sh     # Security posture audit
        - /usr/local/bin/refresh-secrets.sh  # Refresh secrets from Infisical
      
      Timers:
        - audit-containers.timer   (every 15 min)
        - refresh-secrets.timer    (hourly)
      
      Manual usage:
        - audit-containers.sh [--json|--remove|--quiet]
        - security-audit.sh [--json|--days N]
        - refresh-secrets.sh [--force] [app-name]
      
      ════════════════════════════════════════════════════════════════
  when: homelab_apps_mode == 'deploy'
