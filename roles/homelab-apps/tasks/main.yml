---
# Homelab Apps Role - Manifest-Based Application Deployment
# 
# This role reads from the homelab-apps manifest.yml to determine which
# applications to deploy on each host, then handles deployment and optional restore.
#
# Variables:
#   - homelab_apps_repo: Git repo URL (default from manifest settings)
#   - homelab_apps_branch: Git branch (default: main)
#   - homelab_apps_path: Local path on host (default: /opt/apps)
#   - homelab_apps_restore: Whether to restore from backup (default: from manifest)
#   - app_filter: When set, deploy only this single app (e.g. "vaultwarden")

- name: Set default variables
  ansible.builtin.set_fact:
    homelab_apps_path: "{{ homelab_apps_path | default('/opt/apps') }}"
    homelab_stacks_path: "{{ homelab_stacks_path | default('/opt/stacks') }}"
    homelab_apps_branch: "{{ homelab_apps_branch | default('main') }}"

# =============================================================================
# Clone/Update the homelab-apps repository
# =============================================================================

- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true

- name: Mark homelab-apps directory as safe for git
  ansible.builtin.command:
    cmd: git config --global --add safe.directory {{ homelab_apps_path }}
  changed_when: false

- name: Clone homelab-apps repository
  ansible.builtin.git:
    repo: "{{ homelab_apps_repo | default('https://github.com/LuckyPrayer/homelab-apps.git') }}"
    dest: "{{ homelab_apps_path }}"
    version: "{{ homelab_apps_branch }}"
    force: true
  register: git_clone_result

- name: Read manifest.yml
  ansible.builtin.slurp:
    src: "{{ homelab_apps_path }}/manifest.yml"
  register: manifest_raw

- name: Parse manifest
  ansible.builtin.set_fact:
    manifest: "{{ manifest_raw.content | b64decode | from_yaml }}"

# =============================================================================
# Resolve apps for this host
# =============================================================================

- name: Get host configuration from manifest
  ansible.builtin.set_fact:
    host_config: "{{ manifest.hosts[inventory_hostname] | default({}) }}"

- name: Fail if host not in manifest
  ansible.builtin.fail:
    msg: "Host {{ inventory_hostname }} not found in manifest.yml"
  when: host_config | length == 0

- name: Resolve profile apps
  ansible.builtin.set_fact:
    profile_apps: >-
      {{
        host_config.profiles | default([])
        | map('extract', manifest.profiles)
        | map(attribute='apps', default=[])
        | flatten
        | unique
        | list
      }}

- name: Combine profile apps with additional apps
  ansible.builtin.set_fact:
    all_apps: "{{ (profile_apps + (host_config.apps | default([]))) | unique | list }}"

- name: Remove excluded apps
  ansible.builtin.set_fact:
    final_apps: "{{ all_apps | difference(host_config.exclude | default([])) | list }}"

- name: Filter to specific app (app_filter)
  ansible.builtin.set_fact:
    final_apps: "{{ final_apps | select('equalto', app_filter) | list }}"
  when: app_filter is defined and app_filter | length > 0

- name: Display apps to deploy
  ansible.builtin.debug:
    msg: "Apps to deploy on {{ inventory_hostname }}: {{ final_apps | join(', ') }}"

# =============================================================================
# Deploy each application
# =============================================================================

- name: Check which apps exist in repository
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/{{ item }}/docker-compose.yml"
  loop: "{{ final_apps }}"
  register: app_exists_check

- name: Build list of deployable apps
  ansible.builtin.set_fact:
    deployable_apps: >-
      {{
        app_exists_check.results
        | selectattr('stat.exists', 'equalto', true)
        | map(attribute='item')
        | list
      }}

- name: Warn about missing apps
  ansible.builtin.debug:
    msg: "WARNING: App '{{ item }}' not found in repository, skipping"
  loop: "{{ final_apps | difference(deployable_apps) }}"
  when: final_apps | difference(deployable_apps) | length > 0

# =============================================================================
# Enforce allowed_hosts from each app's config.yml
# =============================================================================

- name: Read config.yml for each deployable app
  ansible.builtin.slurp:
    src: "{{ homelab_apps_path }}/{{ item }}/config.yml"
  loop: "{{ deployable_apps }}"
  register: app_configs_raw
  failed_when: false

- name: Parse app configs and check allowed_hosts
  ansible.builtin.set_fact:
    _app_configs: >-
      {%- set result = {} -%}
      {%- for item in app_configs_raw.results -%}
        {%- if item.content is defined -%}
          {%- set cfg = item.content | b64decode | from_yaml -%}
          {%- set _ = result.update({item.item: cfg}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Warn about manifest/allowed_hosts mismatches
  ansible.builtin.debug:
    msg: >-
      ⚠ MISMATCH: App '{{ item }}' is assigned to {{ inventory_hostname }} in manifest.yml
      but allowed_hosts in config.yml is {{ _app_configs[item].allowed_hosts }}.
      Skipping deployment. Update allowed_hosts or manifest.yml to resolve.
  loop: "{{ deployable_apps }}"
  when:
    - _app_configs[item] is defined
    - _app_configs[item].allowed_hosts is defined
    - _app_configs[item].allowed_hosts | length > 0
    - inventory_hostname not in _app_configs[item].allowed_hosts

- name: Filter apps by allowed_hosts
  ansible.builtin.set_fact:
    deployable_apps: >-
      {%- set allowed = [] -%}
      {%- for app in deployable_apps -%}
        {%- if _app_configs[app] is defined
            and _app_configs[app].allowed_hosts is defined
            and _app_configs[app].allowed_hosts | length > 0
            and inventory_hostname not in _app_configs[app].allowed_hosts -%}
          {# skip - host not in allowed_hosts #}
        {%- else -%}
          {%- set _ = allowed.append(app) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ allowed }}

- name: Display final deployable apps (after allowed_hosts filtering)
  ansible.builtin.debug:
    msg: "Apps to deploy on {{ inventory_hostname }} (allowed_hosts verified): {{ deployable_apps | join(', ') }}"

# =============================================================================
# DEPLOY MODE: Deploy applications
# =============================================================================

- name: Create stacks directory
  ansible.builtin.file:
    path: "{{ homelab_stacks_path | default('/opt/stacks') }}"
    state: directory
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Deploy applications
  ansible.builtin.include_tasks: deploy-app.yml
  loop: "{{ deployable_apps }}"
  loop_control:
    loop_var: app_name
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Handle restore if enabled in manifest
# =============================================================================

- name: Check if restore is enabled for this host
  ansible.builtin.set_fact:
    restore_enabled: "{{ host_config.restore.enabled | default(false) }}"
    restore_order: "{{ host_config.restore.priority_order | default([]) }}"
  when: homelab_apps_mode == 'deploy'

- name: Run restore for apps (deploy mode)
  ansible.builtin.include_tasks: restore-app.yml
  loop: "{{ restore_order }}"
  loop_control:
    loop_var: app_name
  when:
    - homelab_apps_mode == 'deploy'
    - restore_enabled | bool
    - app_name in deployable_apps
    - homelab_apps_restore | default(true) | bool

# =============================================================================
# BACKUP MODE: Run backup.sh for resolved apps
# =============================================================================

- name: Check backup.sh exists
  ansible.builtin.stat:
    path: "{{ homelab_apps_path }}/scripts/backup.sh"
  register: backup_script_stat
  when: homelab_apps_mode == 'backup'

- name: Fail if backup.sh not found
  ansible.builtin.fail:
    msg: "backup.sh not found at {{ homelab_apps_path }}/scripts/backup.sh. Deploy apps first."
  when:
    - homelab_apps_mode == 'backup'
    - not (backup_script_stat.stat.exists | default(false))

- name: Display apps to backup
  ansible.builtin.debug:
    msg: "Apps to backup on {{ inventory_hostname }}: {{ deployable_apps | join(', ') }}"
  when: homelab_apps_mode == 'backup'

- name: Run backup for each app
  ansible.builtin.shell: |
    {{ homelab_apps_path }}/scripts/backup.sh {{ item }}
  loop: "{{ deployable_apps }}"
  register: backup_results
  failed_when: false
  when: homelab_apps_mode == 'backup'

- name: Display backup results
  ansible.builtin.debug:
    msg: "{{ '✓' if item.rc == 0 else '✗' }} {{ item.item }} (rc={{ item.rc }})"
  loop: "{{ backup_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when:
    - homelab_apps_mode == 'backup'
    - backup_results.results is defined

# =============================================================================
# RESTORE MODE: Restore apps from B2/restic backup
# =============================================================================

- name: Source backup credentials from backup.env
  ansible.builtin.shell: |
    set -a
    source /opt/scripts/backup.env 2>/dev/null || true
    echo "B2_BUCKET=${B2_BUCKET:-}"
    echo "B2_ACCOUNT_ID=${B2_ACCOUNT_ID:-}"
    echo "B2_ACCOUNT_KEY=${B2_ACCOUNT_KEY:-}"
    echo "RESTIC_PASSWORD=${RESTIC_PASSWORD:-}"
  register: backup_env_output
  changed_when: false
  failed_when: false
  when: homelab_apps_mode == 'restore'

- name: Set backup credentials from env
  ansible.builtin.set_fact:
    backup_b2_bucket: "{{ (backup_env_output.stdout_lines | select('match', '^B2_BUCKET=') | first | default('B2_BUCKET=')).split('=', 1)[1] }}"
    backup_b2_account_id: "{{ (backup_env_output.stdout_lines | select('match', '^B2_ACCOUNT_ID=') | first | default('B2_ACCOUNT_ID=')).split('=', 1)[1] }}"
    backup_b2_account_key: "{{ (backup_env_output.stdout_lines | select('match', '^B2_ACCOUNT_KEY=') | first | default('B2_ACCOUNT_KEY=')).split('=', 1)[1] }}"
    backup_restic_password: "{{ (backup_env_output.stdout_lines | select('match', '^RESTIC_PASSWORD=') | first | default('RESTIC_PASSWORD=')).split('=', 1)[1] }}"
  when:
    - homelab_apps_mode == 'restore'
    - backup_env_output.stdout_lines is defined
    - backup_b2_bucket is not defined or backup_restic_password is not defined
  no_log: true

- name: Fail if backup credentials missing
  ansible.builtin.fail:
    msg: "Backup credentials not available. Ensure /opt/scripts/backup.env exists on {{ inventory_hostname }}."
  when:
    - homelab_apps_mode == 'restore'
    - (backup_restic_password is not defined or backup_restic_password | length == 0)

- name: Display apps to restore
  ansible.builtin.debug:
    msg: "Apps to restore on {{ inventory_hostname }}: {{ deployable_apps | join(', ') }}{{ ' (force)' if force_restore | default(false) | bool else '' }}"
  when: homelab_apps_mode == 'restore'

- name: Run restore for apps (restore mode)
  ansible.builtin.include_tasks: restore-app.yml
  loop: "{{ deployable_apps }}"
  loop_control:
    loop_var: app_name
  when: homelab_apps_mode == 'restore'

# =============================================================================
# DEPLOY MODE: Create management scripts
# =============================================================================

- name: Create deploy-apps script
  ansible.builtin.template:
    src: deploy-apps.sh.j2
    dest: /opt/scripts/deploy-apps.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create app-status script
  ansible.builtin.template:
    src: app-status.sh.j2
    dest: /opt/scripts/app-status.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Setup container audit (detect rogue/missing containers)
# =============================================================================

- name: Create audit-containers script
  ansible.builtin.template:
    src: audit-containers.sh.j2
    dest: /opt/scripts/audit-containers.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create audit-containers systemd service
  ansible.builtin.template:
    src: audit-containers.service.j2
    dest: /etc/systemd/system/audit-containers.service
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Create audit-containers systemd timer
  ansible.builtin.template:
    src: audit-containers.timer.j2
    dest: /etc/systemd/system/audit-containers.timer
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Enable and start audit-containers timer
  ansible.builtin.systemd:
    name: audit-containers.timer
    state: started
    enabled: true
    daemon_reload: true
  when: homelab_apps_mode == 'deploy'

# =============================================================================
# DEPLOY MODE: Setup secret refresh service
# =============================================================================

- name: Create refresh-secrets script
  ansible.builtin.template:
    src: refresh-secrets.sh.j2
    dest: /usr/local/bin/refresh-secrets.sh
    mode: '0755'
  when: homelab_apps_mode == 'deploy'

- name: Create refresh-secrets systemd service
  ansible.builtin.template:
    src: refresh-secrets.service.j2
    dest: /etc/systemd/system/refresh-secrets.service
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Create refresh-secrets systemd timer
  ansible.builtin.template:
    src: refresh-secrets.timer.j2
    dest: /etc/systemd/system/refresh-secrets.timer
    mode: '0644'
  notify: reload systemd
  when: homelab_apps_mode == 'deploy'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: homelab_apps_mode == 'deploy'

- name: Enable and start refresh-secrets timer
  ansible.builtin.systemd:
    name: refresh-secrets.timer
    state: started
    enabled: true
  when: homelab_apps_mode == 'deploy'

- name: Display deployment summary
  ansible.builtin.debug:
    msg: |
      
      ════════════════════════════════════════════════════════════════
      Homelab Apps Deployment Complete - {{ inventory_hostname }}
      ════════════════════════════════════════════════════════════════
      
      Deployed apps: {{ deployable_apps | join(', ') }}
      Restore enabled: {{ restore_enabled | default(false) }}
      
      Management scripts:
        - /opt/scripts/deploy-apps.sh        # Redeploy all apps
        - /opt/scripts/app-status.sh         # Check app status
        - /opt/scripts/audit-containers.sh   # Detect rogue/missing containers
        - /usr/local/bin/refresh-secrets.sh  # Refresh secrets from Infisical
      
      Timers:
        - audit-containers.timer   (every 15 min)
        - refresh-secrets.timer    (hourly)
      
      Manual usage:
        - audit-containers.sh [--json|--remove|--quiet]
        - refresh-secrets.sh [--force] [app-name]
      
      ════════════════════════════════════════════════════════════════
  when: homelab_apps_mode == 'deploy'
